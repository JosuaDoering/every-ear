<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#06101c" />
    <title>Live Translation</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main>
      <h1>Live Translation</h1>
      <label>
        Event
        <select id="event"></select>
      </label>
      <label>
        Language
        <select id="language"></select>
      </label>
      <button id="play" class="primary" disabled><span>▶ Play</span></button>
      <div class="level"><div id="level" class="level-bar"></div></div>
      <div id="speaker" class="speaker" hidden></div>
      <audio id="audio" autoplay playsinline></audio>
    </main>
    <script type="module" src="/src/listener.ts"></script>
  </body>
</html>
